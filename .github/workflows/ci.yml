name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (a new push to a PR cancels the old run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The whole gate for a single Bun + TypeScript package: typecheck + Biome + tests.
  check:
    name: check (typecheck + biome + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
